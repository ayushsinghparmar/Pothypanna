<!-- ================= HERO ================= -->

<section class="books-hero">

<div class="hero-content">

<h1>Discover Your Next Great Read</h1>

<p>

Thousands of books. Every genre. One place.

</p>

</div>

</section>

<!-- ================= SEARCH ================= -->

<section class="books-search">

<input
type="text"
placeholder="Search books..."
>

<button>

Search

</button>

</section>

<!-- ================= FILTERS ================= -->

<section class="genre-filter">

<button class="active">All</button>

<button>Romance</button>

<button>Thriller</button>

<button>Philosophy</button>

<button>Business</button>

<button>Biography</button>

<button>Poetry</button>

<button>Horror</button>

<button>Self-help</button>

<button>Children</button>

</section>

<!-- ================= BOOK GRID ================= -->

<section class="books-grid">

<!-- Book Card -->

<div class="book-card">

<img
src="https://placehold.co/300x450?text=Book+Cover"
alt="Book Cover"
>

<div class="book-content">

<h3>Book Title</h3>

<p class="author">

Author Name

</p>

<p class="genre">

Philosophy

</p>

<p>

A short description of the book appears here.

</p>

<div class="book-buttons">

<a href="#">Amazon</a>

<a href="#">Kindle</a>

<a href="#">Pothi</a>

<a href="#">Website</a>

</div>

</div>

</div>

</section>
