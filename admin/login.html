<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pothypanna Admin Login</title>

<link rel="stylesheet" href="admin.css">

</head>

<body>

<div class="login-container">

<div class="login-card">

<img src="../logo.png" class="logo" alt="Pothypanna">

<h1>Admin Login</h1>

<p>Welcome back to Pothypanna.</p>

<form id="loginForm">

<input
type="email"
id="email"
placeholder="Email"
required
>

<input
type="password"
id="password"
placeholder="Password"
required
>

<button type="submit">

Login

</button>

</form>

<p id="error"></p>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="admin.js"></script>

</body>
</html>
